<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MarkPaste — a fast Markdown editor with live preview and one-click copy to rich text you can paste straight into Word, Outlook, Gmail, or Slack.">
    <title>MarkPaste — Markdown to rich text, one click</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-brand">
            <span class="brand-glyph">◈</span>
            <h1 id="app-title">MarkPaste</h1>
        </div>
        <div class="center-controls">
            <div class="style-menu">
                <button class="style-trigger" id="style-trigger" title="Output style" aria-haspopup="true" aria-expanded="false">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><circle cx="5.6" cy="6.6" r="1" fill="currentColor"/><circle cx="8" cy="5.3" r="1" fill="currentColor"/><circle cx="10.4" cy="6.6" r="1" fill="currentColor"/></svg>
                    <span id="style-current">Aurum</span>
                    <svg class="chev" width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="style-dropdown" id="style-dropdown" hidden>
                    <button class="style-option" data-style="editorial">Aurum</button>
                    <button class="style-option" data-style="business">Metro</button>
                    <button class="style-option" data-style="academic">Folio</button>
                </div>
            </div>
        <div class="view-toggle">
            <button class="view-btn" id="view-editor" title="Editor only (Alt+1)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M5.5 5.5h5M5.5 8h5M5.5 10.5h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="view-btn active" id="view-split" title="Split view (Alt+2)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect x="1.5" y="2" width="5.5" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                    <rect x="9" y="2" width="5.5" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                </svg>
            </button>
            <button class="view-btn" id="view-preview" title="Preview only (Alt+3)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 3C4.5 3 2 8 2 8s2.5 5 6 5 6-5 6-5-2.5-5-6-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                    <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4"/>
                </svg>
            </button>
        </div>
        </div>
        <div class="file-controls">
            <input type="file" id="file-input" accept=".md" />
            <label for="file-input" class="btn btn-ghost">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-right:4px"><path d="M6 1v7M3 5l3-4 3 4M1 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Open
            </label>
            <button id="clear-editor" class="btn btn-ghost" title="Clear the editor — start a blank document (Ctrl+Shift+X)">Clear</button>
            <button id="paste-clipboard" class="btn btn-ghost" title="Clear, then paste from clipboard (Ctrl+Shift+V)">Clear+Paste</button>
            <span class="divider-v"></span>
            <button id="refresh-file" class="btn btn-ghost" title="Reload file from disk">↺ Refresh</button>
            <button id="save-md" class="btn btn-ghost">Save</button>
            <button id="save-as-md" class="btn btn-ghost">Save As</button>
            <span class="divider-v"></span>
            <button id="save-html" class="btn btn-outline">HTML</button>
            <button id="save-word" class="btn btn-outline">Word</button>
            <button id="save-pdf" class="btn btn-outline">PDF</button>
            <span class="divider-v"></span>
            <button id="copy-clipboard" class="btn btn-primary" title="Copy as rich text — paste into Word / email / Notion (Ctrl/⌘+Shift+C)">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" style="margin-right:5px"><rect x="5.25" y="5.25" width="9" height="9" rx="1.6" stroke="currentColor" stroke-width="1.5"/><path d="M10.75 5.25V3.6A1.6 1.6 0 0 0 9.15 2h-5.3A1.6 1.6 0 0 0 2.25 3.6v5.3A1.6 1.6 0 0 0 3.85 10.5H5.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <span class="copy-label">Copy</span>
            </button>
            <span class="divider-v"></span>
            <button id="theme-toggle" class="btn btn-icon-only" title="Toggle Light / Dark">◑</button>
        </div>
    </header>

    <div class="toolbar">
        <div class="toolbar-group">
            <button data-action="bold" title="Bold (Ctrl+B)" class="tool-btn"><b>B</b></button>
            <button data-action="italic" title="Italic (Ctrl+I)" class="tool-btn"><i>I</i></button>
            <button data-action="strikethrough" title="Strikethrough" class="tool-btn"><s>S</s></button>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <button data-action="h1" title="Heading 1" class="tool-btn">H1</button>
            <button data-action="h2" title="Heading 2" class="tool-btn">H2</button>
            <button data-action="h3" title="Heading 3" class="tool-btn">H3</button>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <button data-action="ul" title="Unordered List" class="tool-btn">• List</button>
            <button data-action="ol" title="Ordered List" class="tool-btn">1. List</button>
            <button data-action="checklist" title="Checklist" class="tool-btn">☐ Check</button>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <button data-action="link" title="Link" class="tool-btn">⌘ Link</button>
            <button data-action="image" title="Image" class="tool-btn">⊞ Img</button>
            <button data-action="code" title="Inline Code" class="tool-btn">`code`</button>
            <button data-action="codeblock" title="Code Block" class="tool-btn">```</button>
        </div>
        <span class="toolbar-separator"></span>
        <div class="toolbar-group">
            <button data-action="blockquote" title="Blockquote" class="tool-btn">" Quote</button>
            <button data-action="hr" title="Horizontal Rule" class="tool-btn">— HR</button>
            <button data-action="table" title="Table" class="tool-btn">⊞ Table</button>
        </div>
        <span class="status-indicator" id="save-status"></span>
    </div>

    <div class="editor-container">
        <div class="panel-wrapper" id="editor-panel">
            <div class="panel-label">Editor</div>
            <textarea id="markdown-input" placeholder="Start writing… or drag & drop a .md file here"></textarea>
        </div>
        <div class="resizer" id="resizer"><div class="resizer-handle"></div></div>
        <div class="panel-wrapper" id="preview-panel">
            <div class="panel-label">Preview</div>
            <div id="rendered-output"></div>
        </div>
    </div>

    <footer class="app-footer">
        <span class="footer-tagline">Markdown in, rich text out.</span>
        <nav class="footer-links">
            <a class="footer-link" href="https://github.com/tokicode/markpaste" target="_blank" rel="noopener" title="GitHub">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38l-.01-1.34c-2.22.48-2.69-1.07-2.69-1.07-.36-.92-.89-1.17-.89-1.17-.73-.5.06-.49.06-.49.8.06 1.23.83 1.23.83.71 1.22 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.77-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.83-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.52.56.83 1.28.83 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48l-.01 2.2c0 .21.15.46.55.38A8 8 0 0 0 8 0Z"/></svg>
                <span>GitHub</span>
            </a>
            <a class="footer-link" href="https://www.linkedin.com/in/wenyun/" target="_blank" rel="noopener" title="LinkedIn">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M13.6 0H2.4A2.4 2.4 0 0 0 0 2.4v11.2A2.4 2.4 0 0 0 2.4 16h11.2a2.4 2.4 0 0 0 2.4-2.4V2.4A2.4 2.4 0 0 0 13.6 0ZM4.9 13.4H2.6V6h2.3v7.4ZM3.7 5A1.34 1.34 0 1 1 3.7 2.3 1.34 1.34 0 0 1 3.7 5Zm9.7 8.4h-2.3V9.8c0-.86-.02-1.96-1.2-1.96-1.2 0-1.38.94-1.38 1.9v3.66H6.3V6h2.2v1h.03c.31-.58 1.06-1.2 2.18-1.2 2.33 0 2.76 1.54 2.76 3.54v4.06Z"/></svg>
                <span>LinkedIn</span>
            </a>
            <a class="footer-link footer-bmc" href="https://buymeacoffee.com/tokicode" target="_blank" rel="noopener" title="Buy me a coffee">
                <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" aria-hidden="true"><path d="M2.5 6h9v3a3.5 3.5 0 0 1-3.5 3.5h-2A3.5 3.5 0 0 1 2.5 9V6Z" stroke-linejoin="round"/><path d="M11.5 6.5h1.2a1.8 1.8 0 0 1 0 3.6h-.9" stroke-linecap="round"/><path d="M4.6 3.2c-.3.4-.3.8 0 1.2M7 3.2c-.3.4-.3.8 0 1.2M9.4 3.2c-.3.4-.3.8 0 1.2" stroke-linecap="round"/></svg>
                <span>Buy me a coffee</span>
            </a>
        </nav>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/markdown-it@12.3.2/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@3.0.3/dist/markdown-it-footnote.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
